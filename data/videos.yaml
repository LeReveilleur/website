  - youtube_id: "u3QnT73jE2U"
    title: "L'IA face aux défis énergétiques (ft. Science4All)"
    url: "/lia-face-aux-defis-energetiques"
    description: |
      Dans cette vidéo, on parle de l’intelligence artificielle (IA). Dans un
      premier temps, on s’intéresse à la consommation énergétique des
      technologies numériques dont l’IA fait partie. Cet impact est déjà
      conséquent et croît assez vite. Ensuite, on s’intéresse aux applications
      de l’IA dans le système énergétique et notamment aux smartgrids. L’IA
      peut nous aider à mieux gérer l’intégration de moyens intermittents de
      production d’électricité.
    date: "2018-07-30"
    categories:
      - "Énergie"
    tags:
      - "Collaboration"

  - youtube_id: "hESxYif5pdI"
    title: "Le Photovoltaïque"
    url: "/le-photovoltaique"
    description: |
      On commence par parler de l’énergie radiative que nous envoie notre cher
      Soleil. Ensuite, j’explique comment un panneau photovoltaïque fonctionne
      en me concentrant sur les technologies à base de silicium qui sont
      largement majoritaires. Détailler la structure me permet de dire quelques
      mots sur la recyclabilité de ces panneaux, sur les ressources utilisées
      et sur la durée de vie. La discussion se porte ensuite sur les panneaux
      sur toit ou en parc. On aborde également l’intermittence et le bas
      facteur de charge. Mais surtout, je prends le temps d’expliquer une
      notion hyper importante: le taux de retour énergétique, avant de voir ce
      que donne les panneaux photovoltaïques sur cet aspect fondamental On se
      demande également si la technologie photovoltaïque est bonne pour le
      climat. Enfin, on parle de la situation actuelle du photovoltaïque dans
      le monde et des technologies photovoltaïques prometteuses avant de
      conclure.
    date: "2018-07-26"
    categories:
      - "Énergie"
      - "Renouvelables"

  - youtube_id: "NIVPzTFhzQY"
    title: "Quota Carbone Individualisé, un concept pour sauver le monde ?"
    url: "/quota-carbone-individualise-un-concept-pour-sauver-le-monde"
    description: |
      Dans cette vidéo, je vous parle d'une idée que je trouve intéressante: le
      quota carbone individualisé. En gros, on donne à chacun un quota carbone
      qui fait office de monnaie parallèle. On doit donc tout acheter avec nos
      euros et notre quota CO2. Est-ce que vous pensez que c'est une bonne idée
      pour régler le problème du changement climatique ?
    date: "2018-07-13"
    categories:
      - "Politique"
      - "Climat"

  - youtube_id: "wXqIZxV6VHE"
    title: "L'éolien"
    url: "/leolien"
    description: |
      Dans cette vidéo, on étudie les éoliennes à fond. Après un petit point
      sur l’énergie exploitée, le fonctionnement d’une éolienne est présentée.
      On voit différents types d’éoliennes: terrestres et offshores
      ([6:30](https://www.youtube.com/watch?v=wXqIZxV6VHE&t=390s)). Puis, je
      parle un peu de l’éolien domestique
      ([9:02](https://www.youtube.com/watch?v=wXqIZxV6VHE&t=542s)). Une fois
      qu’on a compris comment fonctionne les éoliennes, on s’intéresse aux
      défauts ([10:30](https://www.youtube.com/watch?v=wXqIZxV6VHE&t=630s)):
      impact sur les oiseaux, impacts sur la santé humaine et utilisation des
      terres rares. Puis, ce qui est sans doute le plus gros défaut:
      l’intermittence
      ([17:33](https://www.youtube.com/watch?v=wXqIZxV6VHE&t=1053s)). Il faut
      ensuite parler des avantages, qui sont assez évidents
      ([24:28](https://www.youtube.com/watch?v=wXqIZxV6VHE&t=1468s)). Et enfin,
      je parle un peu de la situation en France et dans le monde
      ([25:28](https://www.youtube.com/watch?v=wXqIZxV6VHE&t=1528s)).
    date: "2018-05-29"
    categories:
      - "Énergie"
      - "Renouvelables"

  - youtube_id: "71EopUDDJ04"
    title: "L'hydroélectricité"
    url: "/lhydroelectricite"
    description: |
      On va voir l’hydroélectricité en profondeur. Après un petit point sur
      l’énergie exploitée et le fonctionnement d’une centrale hydroélectrique,
      on voit quelles sont les différents types d’installations
      hydroélectriques
      ([3:50](https://www.youtube.com/watch?v=71EopUDDJ04&t=230s)): des gros
      barrages aux petites installations au fil de l’eau. On voit aussi
      quelques ordres de grandeur
      ([7:52](https://www.youtube.com/watch?v=71EopUDDJ04&t=472s)) pour se
      rendre compte qu’il faut beaucoup d’eau pour alimenter un foyer en
      électricité. L’un des gros avantage de l’hydroélectricité, c’est son rôle
      dans la stabilisation du réseau électrique
      ([10:38](https://www.youtube.com/watch?v=71EopUDDJ04&t=638s)) parce
      qu’elle permet le pilotage et le stockage. Je parle également des défauts
      des barrages, impacts à la constructions, risque d’accidents, effets sur
      le climat ([13:08](https://www.youtube.com/watch?v=71EopUDDJ04&t=788s))…
      Enfin, je propose un petit résumé de son développement présent et futur
      en France et dans le monde
      ([19:30](https://www.youtube.com/watch?v=71EopUDDJ04&t=1170s)).
    date: "2018-05-15"
    categories:
      - "Énergie"
      - "Renouvelables"

  - youtube_id: "WZb-y_N4ZwY"
    title: "Analyse du discours d'un climato-sceptique: V. Courtillot. Part. 1"
    url: "/analyse-du-discours-dun-climato-sceptique"
    description: |
      J’analyse une conférence donnée par M. Courtillot qui circule beaucoup
      sur le net ([par exemple](https://www.youtube.com/watch?v=s1LL7Fq1qX0)
      mais nombreuses occurrences). M. Courtillot est un climato-sceptique qui
      remet en question l’origine humaine du changement climatique (qu’il
      reconnaît). Dans cette vidéo, j’analyse la première partie de sa
      conférence. C’est l’occasion d’apprendre plein de choses intéressantes
      sur le climat et sur certains arguments développés par les
      climato-sceptiques.  Vous pouvez aussi aller voir la série de
      [questions/réponses](https://www.youtube.com/watch?v=s1LL7Fq1qX0) qui
      suit la conférence. M. Courtillot précise même qu’il faut se calmer sur
      le CO2 (pour des problèmes comme l’acidification des océans).
    date: "2018-05-01"
    categories:
      - "Climat"
      - "Analyse critique"
      - "Climatosceptique"

  - youtube_id: "eruVCRrIkCY"
    title: "L'énergie et nous"
    url: "/lenergie-et-nous"
    description: |
      L'énergie est indispensable au vivant et à nos sociétés industrielles.
      C'est un concept central en physique. Pourtant comprendre ce qu'est
      l'énergie, ce n'est pas facile... Surtout que la façon dont on utilise le
      mot couramment ne correspond pas à la réalité. En fait, on devrait plutôt
      parler d'exergie et on en parle dans la vidéo !

      Cette vidéo permet aussi de voir ce que le corps humain utilise comme
      énergie. On voit aussi que cette quantité est faible par rapport à ce que
      nous utilisons dans nos sociétés. Le problème, c'est que cette quantité
      faramineuse d'énergie repose pour beaucoup sur des ressources
      non-renouvelables et provoque de graves impacts environnementaux. Du
      coup, l'énergie dans nos sociétés est un sujet extrêmement important.
      C'est un sujet technique mais aussi, et surtout, politique, social et
      économique.
    date: "2018-04-17"
    categories:
      - "Énergie"
