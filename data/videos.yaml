  - youtube_id: "m5zl8NWMfWE"
    title: "Éolien, photovoltaïque et réseau électrique - Partie 1/2 & 2/2"
    url: "/eolien-photovoltaique-et-reseau-electrique"
    description: |
      Dans cette vidéo, je regarde quelles sont les contraintes que la physique
      de l'électricité et du réseau électrique impose aux différents modes de
      production. J'explique d'abord comment les réseaux électriques
      fonctionnaient jusque-là avec des centrales électriques fonctionnant "en
      base" et d'autres modulant leur production pour ajuster la production
      électrique à la demande. L'arrivée de moyens de production dits
      intermittents, notamment la production éolienne et photovoltaïque,
      chamboulent ce fonctionnement historique. Puisqu'on ne contrôle pas la
      météo, la variabilité de ces moyens de productions est subie et le reste
      du système de production électrique doit s'adapter en
      conséquence.<br><br>
      Je quantifie cette intermittence (10:47). Je parle ensuite du
      foisonnement (13:56), l'idée que vu qu'il y aurait toujours du vent
      quelque part, il suffirait de répartir géographiquement les moyens
      renouvelables intermittents pour pallier l'intermittence. Ce qui nous
      amène à parler un peu des échanges d'électricité entre pays européens
      (20:02). Enfin, je parle de l'écrêtement (22:55), la possibilité de
      surdimensionner les moyens de production intermittents pour augmenter la
      part de l'électricité pouvant être produit par ces moyens au prix d'une
      faible surproduction.
    date: "2020-02-17"
    categories:
      - "Énergie"
      - "Électricité"
      - "Avec un résumé"

  - youtube_id: "E3YLYzs_1Es"
    title: "Stockage géologique profond des déchets radioactifs - Déchets radioactifs #4"
    url: "/le-stockage-geologique-profond-des-dechets-radioactifs"
    description: |
      Dans cette quatrième vidéo sur les déchets radioactifs, je vous parle
      enfin du mode préférentielle pour la gestion à long terme (sur des
      dizaines de milliers d’années) des déchets radioactifs les plus
      dangereux : le stockage géologique profond. Après un résumé rapide des
      épisodes précédents, je rappelle la problématique: Comment s’assurer que
      la radioactivité des déchets de haute activité et de moyenne activité à
      vie longue ne présente pas de risques pour l’environnement et les
      sociétés humaines sur le long terme. Je présente les principes généraux
      du stockage géologique profond avant d’exposer la fascinante anecdote des
      réacteurs naturels d’Oklo (10:28). Je me concentre ensuite le projet
      Cigéo: le projet français de stockage géologique profond (14:22). J’y
      aborde pleins d’aspects différents: refroidissement des colis (17:33),
      impacts des fuites de radionucléides (22:26) ou encore la question de la
      mémoire (24:42). Je prends aussi le temps d’expliquer l’impact de ce
      stockage sur les émissions de CO2 du nucléaire (32:40) et je touche
      quelques mots des opposants et de Greenpeace en particulier (35:39) avant
      de conclure (39:00).
