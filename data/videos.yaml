  - youtube_id: "yr-tn-Xj-vw"
    title: "Peut-on faire disparaître les déchets radioactifs ? - Déchets radioactifs #2"
    url: "/transmutation-et-mox"
    description: |
      Dans cette seconde vidéo sur les déchets radioactifs, j'explique comment
      on essaye de réduire la radiotoxicité des déchets radioactifs. Je parle
      donc de la transmutation. La logique de la transmutation des déchets
      radioactifs est de modifier la structure de certains radionucléides pour
      les rendre moins dangereux. La transmutation a des avantages mais
      également des défauts qui limitent considérablement son usage aujourd'hui
      et questionne son usage à l'avenir (7:18). J'aborde notamment la
      transmutation par laser qui a beaucoup fait parler d'elle, malgré des
      applications limitées (9:18). Je me penche ensuite sur le MOx (14:50): ce
      combustible qu'on produit à partir du plutonium issu du retraitement et
      de l'uranium appauvri. C'est l'occasion de parler de l'utilisation
      potentielle du plutonium de retraitement dans des bombes nucléaires et
      des avantages environnementaux du MOx qui est, au final, une forme de
      recyclage partielle des déchets nucléaires. Enfin, je discute un peu de
      l'influence du futur du nucléaire (déploiement d'une quatrième génération
      ou arrêt du nucléaire) sur la question des déchets radioactifs (32:36)
      avant de conclure (38:24).
    date: "2019-10-10"
    categories:
      - "Énergie"
      - "Nucléaire"
      - "Déchets radioactifs"
      - "Avec un résumé"

  - youtube_id: "p0zX8eUW_jQ"
    title: "De la centrale aux déchets radioactifs - Déchets radioactifs #1"
    url: "/de-la-centrale-aux-dechets-radioactifs"
    description: |
      Dans cette vidéo, j'introduis le sujet des déchets radioactifs.
      J'explique rapidement ma méthode et je donne quelques sources utiles. Je
      définis ensuite ce qu'est un déchet radioactif et j'oriente la vidéo vers
      les déchets dits de "haute activité" qui sont les plus dangereux. C'est
      l'occasion de rappeler la différence entre danger et risque qui est
      fondamentale pour bien comprendre cette question. Je m'intéresse ensuite
      à ce qu'il y a dans le combustible usé des centrales nucléaires et la
      façon dont on le gère. Après un entreposage obligatoire en piscine, le
      combustible usé est entièrement considéré comme un déchet radioactif dans
      certains pays (dont les États-Unis) avant d'être entreposé à sec.
      D'autres pays (dont la France) ont fait le choix de retraiter le
      combustible et donc de séparer les éléments les plus gênants (produits de
      fission et actinides mineurs) des éléments valorisables (uranium et
      plutonium).<br><br>
      Dans la prochaine vidéo de cette mini-série, on parlera de la
      transmutation, du combustible MOx (avantage et défauts) et, logiquement,
      de l'influence du futur du nucléaire sur la gestion de ces déchets.
    date: "2019-09-19"
    categories:
      - "Énergie"
      - "Nucléaire"
      - "Déchets radioactifs"
      - "Avec un résumé"

